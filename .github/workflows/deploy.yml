name: Deploy

on:
  push:
    branches: ["main"]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Detect which parts of the repo changed
  # ─────────────────────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend:    ${{ steps.filter.outputs.backend }}
      controller: ${{ steps.filter.outputs.controller }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'app.py'
              - 'sports_ticker/**'
              - 'requirements.txt'
              - '*.json'
            controller:
              - 'ticker_controller/**'
              - 'updater.py'
              - 'ticker-controller.service'
              - 'setup.sh'

  # ─────────────────────────────────────────────────────────────────────────
  # Deploy backend to server (only when backend files changed)
  # ─────────────────────────────────────────────────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@master
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          source:   "app.py,sports_ticker/**,requirements.txt,*.json,ticker_controller/**,updater.py"
          target:   "/home/${{ secrets.SSH_USER }}/"

      - name: Write .env and restart backend
        uses: appleboy/ssh-action@master
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          script: |
            cd /home/${{ secrets.SSH_USER }}/

            # ── Generate .env ──────────────────────────────────────────────
            echo "FINNHUB_KEY_1=${{ secrets.FINNHUB_KEY_1 }}"           > .env
            echo "FINNHUB_KEY_2=${{ secrets.FINNHUB_KEY_2 }}"          >> .env
            echo "FINNHUB_KEY_3=${{ secrets.FINNHUB_KEY_3 }}"          >> .env
            echo "FINNHUB_KEY_4=${{ secrets.FINNHUB_KEY_4 }}"          >> .env
            echo "FINNHUB_KEY_5=${{ secrets.FINNHUB_KEY_5 }}"          >> .env
            echo "SPOTIFY_CLIENT_ID=${{ secrets.SPOTIFY_CLIENT_ID }}"  >> .env
            echo "SPOTIFY_CLIENT_SECRET=${{ secrets.SPOTIFY_CLIENT_SECRET }}" >> .env
            echo "SPOTIFY_REFRESH_TOKEN=${{ secrets.SPOTIFY_REFRESH_TOKEN }}" >> .env
            echo "SPOTIFY_USERNAME=${{ secrets.SPOTIFY_USERNAME }}"    >> .env
            echo "SPOTIFY_PASSWORD=${{ secrets.SPOTIFY_PASSWORD }}"    >> .env
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"        >> .env
            chmod 600 .env

            # ── Install deps ──────────────────────────────────────────────
            pip3 install -r requirements.txt --break-system-packages 2>/dev/null \
              || pip3 install -r requirements.txt
            pip3 install librespot protobuf google-generativeai google-genai spotipy \
              --break-system-packages 2>/dev/null || true

            # ── Restart backend ───────────────────────────────────────────
            echo "Restarting ticker (backend)..."
            sudo systemctl restart ticker
            sudo systemctl status ticker --no-pager

  # ─────────────────────────────────────────────────────────────────────────
  # Signal all Pi tickers to pull the new controller code
  # (only when ticker_controller/** or updater.py changed)
  # ─────────────────────────────────────────────────────────────────────────
  signal-fleet:
    runs-on: ubuntu-latest
    needs: [changes, deploy-backend]
    # Run even if deploy-backend was skipped (controller-only push)
    if: |
      always() &&
      needs.changes.outputs.controller == 'true' &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')
    steps:
      - name: Send update signal to all tickers
        run: |
          echo "Controller code changed — signalling fleet..."
          COUNT=$(git rev-list --count HEAD)
          SHA=$(git rev-parse --short HEAD)
          VERSION="r${COUNT}+${SHA}"
          echo "New version: ${VERSION}"
          curl -s -o /dev/null -w "HTTP %{http_code}\n" \
            -X POST https://ticker.mattdicks.org/api/hardware \
            -H "Content-Type: application/json" \
            -d "{\"action\":\"update\",\"ticker_id\":\"all\",\"version\":\"${VERSION}\"}"
