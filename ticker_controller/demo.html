<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Ticker — Live Demo</title>
<style>
:root{--bg:#080808;--acc:#1db954;--text:#ddd;--dim:#555;--btn:#1a1a1a;--brd:#2a2a2a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 12px;gap:14px}
h1{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--acc)}
.badge{font-size:9px;padding:2px 6px;background:rgba(29,185,84,.15);color:var(--acc);border-radius:3px;letter-spacing:2px;margin-left:6px}
.bezel{background:#181818;border-radius:8px;padding:14px 18px 18px;box-shadow:0 0 0 2px #222,0 0 0 4px #111,0 12px 50px rgba(0,0,0,.9);position:relative}
.bezel::before{content:'SPORTS TICKER DISPLAY';position:absolute;top:5px;left:50%;transform:translateX(-50%);font-size:7px;letter-spacing:3px;color:#2a2a2a;white-space:nowrap}
canvas#ticker{display:block;image-rendering:pixelated;border-radius:2px}
.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;align-items:flex-end;max-width:950px}
.cg{display:flex;flex-direction:column;align-items:center;gap:5px}
.cl{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase}
input[type=range]{accent-color:var(--acc);width:100px;cursor:pointer}
select{background:var(--btn);border:1px solid var(--brd);color:var(--text);padding:6px 8px;border-radius:4px;font-family:inherit;font-size:10px;cursor:pointer}
.btn{background:var(--btn);border:1px solid var(--brd);color:var(--text);padding:6px 12px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:10px;transition:.15s;white-space:nowrap}
.btn:hover{border-color:var(--acc);color:var(--acc)}
.btn.active{border-color:var(--acc);color:var(--acc);background:rgba(29,185,84,.1)}
.mode-row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
#status{font-size:9px;color:var(--dim);letter-spacing:1px;min-height:12px;text-align:center}
.pin-wrap{position:relative}
#pinPanel{display:none;position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);z-index:99;background:#161616;border:1px solid var(--brd);border-radius:6px;width:320px;max-height:260px;overflow-y:auto;padding:6px 0;box-shadow:0 8px 30px rgba(0,0,0,.8)}
#pinPanel.open{display:block}
#pinSearch{width:calc(100% - 16px);margin:4px 8px 6px;padding:5px 8px;background:#0d0d0d;border:1px solid var(--brd);border-radius:4px;color:var(--text);font-family:inherit;font-size:9px;outline:none}
.pin-row{display:flex;align-items:center;gap:7px;padding:4px 10px;cursor:pointer}
.pin-row:hover{background:#1e1e1e}
.pin-row input[type=checkbox]{accent-color:var(--acc);cursor:pointer;flex-shrink:0}
.pin-label{font-size:9px;color:var(--text)}
.pin-badge{font-size:8px;padding:1px 4px;background:rgba(255,255,255,.07);color:var(--dim);white-space:nowrap;flex-shrink:0;margin-left:auto}
.pin-none{font-size:9px;color:var(--dim);padding:10px;text-align:center}
</style>
</head>
<body>
<h1>Sports Ticker <span class="badge">LIVE</span></h1>
<div class="bezel">
  <canvas id="ticker"></canvas>
</div>
<div class="controls">
  <div class="cg" style="max-width:750px">
    <span class="cl">Mode</span>
    <div class="mode-row" id="modeRow">
      <button class="btn active" data-mode="sports"      onclick="setMode('sports')">Sports</button>
      <button class="btn"        data-mode="sports_full" onclick="setMode('sports_full')">Full</button>
      <button class="btn"        data-mode="nhl_full"    onclick="setMode('nhl_full')">NHL</button>
      <button class="btn"        data-mode="mlb_full"    onclick="setMode('mlb_full')">MLB</button>
      <button class="btn"        data-mode="nfl_full"    onclick="setMode('nfl_full')">NFL</button>
      <button class="btn"        data-mode="nba_full"    onclick="setMode('nba_full')">NBA</button>
      <button class="btn"        data-mode="soccer_full" onclick="setMode('soccer_full')">Soccer</button>
      <button class="btn"        data-mode="golf"        onclick="setMode('golf')">Golf</button>
      <button class="btn"        data-mode="masters"     onclick="setMode('masters')">Masters</button>
      <button class="btn"        data-mode="music"       onclick="setMode('music')">Music</button>
      <button class="btn"        data-mode="stocks"      onclick="setMode('stocks')">Stocks</button>
      <button class="btn"        data-mode="flights"     onclick="setMode('flights')">Flights</button>
      <button class="btn"        data-mode="weather"     onclick="setMode('weather')">Weather</button>
      <button class="btn"        data-mode="clock"       onclick="setMode('clock')">Clock</button>
    </div>
  </div>
  <div class="cg">
    <span class="cl">Speed</span>
    <input type="range" id="spd" min="0" max="3" step="0.05" value="0.4" oninput="scrollSpeed=+this.value">
  </div>
  <div class="cg">
    <span class="cl">Scale</span>
    <select id="scl" onchange="applyScale()">
      <option value="4" selected>4×</option>
      <option value="3">3×</option>
      <option value="5">5×</option>
      <option value="6">6×</option>
    </select>
  </div>
  <div class="cg pin-wrap">
    <span class="cl">Pin Games</span>
    <button class="btn" id="pinBtn" onclick="togglePinPanel()">Pin (0)</button>
    <div id="pinPanel">
      <input id="pinSearch" type="text" placeholder="Filter teams…" oninput="buildPinPanel()">
      <div id="pinList"></div>
    </div>
  </div>
  <div class="cg">
    <span class="cl">Display</span>
    <div style="display:flex;gap:5px">
      <button class="btn" id="pauseBtn" onclick="togglePause()">⏸</button>
      <button class="btn active" id="ledBtn" onclick="toggleLed()">LED</button>
    </div>
  </div>
</div>
<div id="status">Connecting…</div>

// ═══════════════════════════════════════════════════════════════════════════════
// FONT RENDERING — exact port of Python drawing functions
// ═══════════════════════════════════════════════════════════════════════════════

// PF 3×5 font (sc=pixel scale, default 1)
function pfChar(ctx, ch, x, y, r, g, b, sc){
  sc=sc||1;
  const bm=PF[ch.toUpperCase()]||PF[' '];
  ctx.fillStyle=`rgb(${r},${g},${b})`;
  for(let row=0;row<5;row++) for(let col=0;col<3;col++)
    if(bm[row][col]) ctx.fillRect(x+col*sc, y+row*sc, sc, sc);
  return 4*sc;
}
function pfText(ctx, text, x, y, r, g, b, sc){
  let cx=x;
  for(const ch of String(text).toUpperCase()) cx+=pfChar(ctx,ch,cx,y,r,g,b,sc);
  return cx-x;
}
function pfW(text, sc){ return String(text).length*4*(sc||1); }

// Hybrid 4×6 font
function drawHybridText(ctx, x, y, text, col){
  const [r,g,b,a]=col;
  ctx.fillStyle=a!=null?`rgba(${r},${g},${b},${a/255})`:`rgb(${r},${g},${b})`;
  let xc=x;
  for(const ch of String(text).toUpperCase()){
    if(ch==='~'){xc+=2;continue;}
    const bm=HF[ch]||HF[' ']||[0,0,0,0,0,0];
    for(let row=0;row<bm.length;row++){
      const byte=bm[row];
      if(byte&0x8) ctx.fillRect(xc+0,y+row,1,1);
      if(byte&0x4) ctx.fillRect(xc+1,y+row,1,1);
      if(byte&0x2) ctx.fillRect(xc+2,y+row,1,1);
      if(byte&0x1) ctx.fillRect(xc+3,y+row,1,1);
    }
    xc+=5;
  }
  return xc-x;
}
function hfW(text){ return String(text).length*5; }

// Tiny 4×5 font
function drawTinyText(ctx, x, y, text, col){
  const [r,g,b]=col;
  ctx.fillStyle=`rgb(${r},${g},${b})`;
  let xc=x;
  for(const ch of String(text).toUpperCase()){
    if(ch==='~'){xc+=2;continue;}
    const bm=TINY[ch]||TINY[' ']||[0,0,0,0,0];
    for(let row=0;row<bm.length;row++){
      const byte=bm[row];
      if(byte&0x8) ctx.fillRect(xc+0,y+row,1,1);
      if(byte&0x4) ctx.fillRect(xc+1,y+row,1,1);
      if(byte&0x2) ctx.fillRect(xc+2,y+row,1,1);
      if(byte&0x1) ctx.fillRect(xc+3,y+row,1,1);
      if(bm.length>4&&(byte&0x10)) ctx.fillRect(xc+4,y+row,1,1);
    }
    xc+=5;
  }
  return xc-x;
}

// ═══════════════════════════════════════════════════════════════════════════════
// DRAWING HELPERS — exact port of stadium.py
// ═══════════════════════════════════════════════════════════════════════════════

function fi(ctx, x, y, w, h, r, g, b, a){
  if(w<=0||h<=0) return;
  ctx.fillStyle=a!=null?`rgba(${r},${g},${b},${a/255})`:`rgb(${r},${g},${b})`;
  ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h));
}

function hexToRgb(hex){
  const h=(hex||'').trim().replace('#','');
  if(h.length===6){
    try{ return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
    catch(e){}
  }
  return [80,80,80];
}

function li(c,f){ f=f||0.4; return c.map(v=>Math.min(255,Math.round(v+(255-v)*f))); }
function da(c,f){ f=f!=null?f:0.5; return c.map(v=>Math.round(v*(1-f))); }

function clamp(v){ return Math.max(0,Math.min(255,Math.round(v))); }

function drawFootball(ctx, cx, cy){
  const br=[139,69,19]; const wh=[255,255,255];
  fi(ctx,cx-2,cy,  5,1,...br); fi(ctx,cx-3,cy+1,7,1,...br); fi(ctx,cx-2,cy+2,5,1,...br);
  fi(ctx,cx-1,cy+1,1,1,...wh); fi(ctx,cx,cy+1,1,1,...wh); fi(ctx,cx+1,cy+1,1,1,...wh);
}

function drawBaseDiamond(ctx, cx, ty, on1, on2, on3){
  const bases=[[cx,ty,on2],[cx+4,ty+4,on1],[cx-4,ty+4,on3]];
  for(const [bx,by,on] of bases){
    const c=on?[255,200,0]:[55,55,55];
    fi(ctx,bx-2,by,  5,1,...c); fi(ctx,bx-1,by+1,3,1,...c);
    fi(ctx,bx,  by+2,1,1,...c); fi(ctx,bx-2,by,  1,1,...c); fi(ctx,bx+2,by,1,1,...c);
  }
}

function drawShootoutDot(ctx, x, y, result, size){
  size=size||5;
  if(result==='goal') fi(ctx,x,y,size,size,50,200,70);
  else if(result==='miss'){
    if(size>=4){
      fi(ctx,x,         y,         2,2,220,55,55); fi(ctx,x+size-2,y,         2,2,220,55,55);
      fi(ctx,x+1,       y+size>>1, size-2,1,220,55,55);
      fi(ctx,x,         y+size-2,  2,2,220,55,55); fi(ctx,x+size-2,y+size-2,  2,2,220,55,55);
    } else {
      fi(ctx,x,  y,  2,1,220,55,55); fi(ctx,x+1,y+1,1,1,220,55,55);
      fi(ctx,x,  y+2,2,1,220,55,55); fi(ctx,x+2,y,  1,1,220,55,55); fi(ctx,x+2,y+2,1,1,220,55,55);
    }
  } else {
    fi(ctx,x,y,size,size,55,55,55); fi(ctx,x+1,y+1,size-2,size-2,10,10,14);
  }
}

function drawSoColumn(ctx, x, y, results, vertical, size, stride, maxShow){
  vertical=vertical!=null?vertical:true; size=size||5; stride=stride||7; maxShow=maxShow||5;
  const nShow=Math.min(Math.max((results||[]).length,3),maxShow);
  for(let i=0;i<nShow;i++){
    const r=results&&i<results.length?results[i]:'pending';
    const dx=vertical?x:x+i*stride, dy=vertical?y+i*stride:y;
    drawShootoutDot(ctx,dx,dy,r,size);
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// LOGO CACHE
// ═══════════════════════════════════════════════════════════════════════════════
const logoCache={};

async function fetchLogo(url){
  if(!url) return null;
  if(url in logoCache) return logoCache[url];
  logoCache[url]=null;
  return new Promise(resolve=>{
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>{
      const oc=document.createElement('canvas'); oc.width=LOGO_SZ; oc.height=LOGO_SZ;
      const c=oc.getContext('2d');
      c.drawImage(img,0,0,LOGO_SZ,LOGO_SZ);
      logoCache[url]=oc;
      resolve(oc);
    };
    img.onerror=()=>{ logoCache[url]=null; resolve(null); };
    img.src=`/proxy/logo?url=${encodeURIComponent(url)}`;
  });
}

async function prefetchLogos(games){
  const pending=[];
  for(const g of games){
    if(g.away_logo&&!(g.away_logo in logoCache)) pending.push(fetchLogo(g.away_logo));
    if(g.home_logo&&!(g.home_logo in logoCache)) pending.push(fetchLogo(g.home_logo));
  }
  await Promise.allSettled(pending);
}

function drawFallbackLogo(ctx, x, y, color){
  const dc=da(color); const lc=li(color,0.25);
  fi(ctx,x,y,LOGO_SZ,LOGO_SZ,...dc);
  fi(ctx,x+2,y+2,LOGO_SZ-4,LOGO_SZ-4,...da(color,0.1));
  fi(ctx,x,y,LOGO_SZ,1,...color); fi(ctx,x,y+LOGO_SZ-1,LOGO_SZ,1,...color);
  fi(ctx,x,y,1,LOGO_SZ,...color); fi(ctx,x+LOGO_SZ-1,y,1,LOGO_SZ,...color);
  fi(ctx,x+1,y+1,LOGO_SZ-2,1,...lc); fi(ctx,x+1,y+1,1,LOGO_SZ-2,...lc);
}

// ═══════════════════════════════════════════════════════════════════════════════
// GAME DATA NORMALIZATION — port of StadiumRenderer._normalise
// ═══════════════════════════════════════════════════════════════════════════════
function normalizeGame(g){
  const out={...g};
  if(!('as' in out)) out.as=parseInt(out.away_score||0)||0;
  else out.as=parseInt(out.as)||0;
  if(!('hs' in out)) out.hs=parseInt(out.home_score||0)||0;
  else out.hs=parseInt(out.hs)||0;
  if(!('away' in out)) out.away=out.away_abbr||'???';
  if(!('home' in out)) out.home=out.home_abbr||'???';
  if(!('sport' in out)) out.sport='unknown';

  const _col=(hexKey,rgbKey,fb)=>{
    if(rgbKey in out&&Array.isArray(out[rgbKey])) return out[rgbKey].slice(0,3).map(Number);
    return hexToRgb(out[hexKey]||'')||fb;
  };
  out.ac=_col('away_color','ac',[80,80,80]);
  out.hc=_col('home_color','hc',[80,80,80]);

  if(!('state' in out)){
    const s=String(out.game_state||out.status||'').toLowerCase();
    if(s.includes('final')||s.includes('post')) out.state='post';
    else if(/[qph]|inning|top|bot|'|live/.test(s)) out.state='in';
    else out.state='pre';
  }
  const sit=out.situation||{}; out.sit=sit;
  const so=sit.shootout; if(so&&typeof so==='object') out.so=so;
  return out;
}

function sideFromValue(val, g){
  if(!val) return null;
  const s=String(val).trim().toUpperCase();
  const hTokens=new Set([g.home,g.home_abbr,g.home_id,'HOME','H'].map(v=>String(v||'').toUpperCase()).filter(Boolean));
  const aTokens=new Set([g.away,g.away_abbr,g.away_id,'AWAY','A'].map(v=>String(v||'').toUpperCase()).filter(Boolean));
  if(hTokens.has(s)) return 'home';
  if(aTokens.has(s)) return 'away';
  return null;
}

// ═══════════════════════════════════════════════════════════════════════════════
// CARD WIDTH CALCULATOR — port of stadium.py calc_card_width
// ═══════════════════════════════════════════════════════════════════════════════
function calcCardWidth(g){
  const sport=(g.sport||'').toLowerCase();
  const isActive=(g.state||'')!=='pre'&&(g.state||'')==='in';
  const isMLB=sport.includes('baseball')||sport.includes('mlb');
  const isNFL=sport.includes('football')||sport.includes('nfl');
  const isNHL=sport.includes('hockey')||sport.includes('nhl');
  const isSoc=sport.includes('soccer');
  const sit=g.situation||{};
  const shootout=sit.shootout||(g.so||null);
  const isSO=!!shootout;
  const dd=sit.downDist||g.dd||'';
  const aScore=String(g.away_score||g.as||0);
  const hScore=String(g.home_score||g.hs||0);
  const status=String(g.status||'');

  let center=pfW(aScore,2)+pfW('-',2)+pfW(hScore,2);
  if(isMLB&&isActive) center=Math.max(center,center+2);
  else center=Math.max(center,pfW(status));
  if(isNFL&&isActive&&dd) center=Math.max(center,pfW(dd));
  if((isNHL||isSoc)&&isSO) center=Math.max(center,pfW(aScore,2)+pfW('-',2)+pfW(hScore,2)+14);
  const total=ZONE+4+center+4+ZONE;
  return Math.min(160,Math.floor((total+1)/2)*2);
}

// ═══════════════════════════════════════════════════════════════════════════════
// STADIUM CARD RENDERER — port of StadiumRenderer.render
// ═══════════════════════════════════════════════════════════════════════════════
function renderStadiumCard(rawG){
  const g=normalizeGame(rawG);
  const CW=calcCardWidth(g);
  const oc=document.createElement('canvas'); oc.width=CW; oc.height=PH;
  const ctx=oc.getContext('2d');

  const sport=g.sport.toLowerCase();
  const isActive=g.state==='in';
  const isMLB=sport.includes('baseball')||sport.includes('mlb');
  const isNFL=sport.includes('football')||sport.includes('nfl');
  const isNHL=sport.includes('hockey')||sport.includes('nhl');
  const isSoc=sport.includes('soccer');
  const isMarch=sport.includes('march');
  const sit=g.sit||{};
  const shootout=sit.shootout||g.so||null;
  const isSO=!!shootout;

  // ── Background
  fi(ctx,0,0,CW,PH,0,0,0);
  fi(ctx,0,7,CW,1,55,76,130);

  const status=String(g.status||'').slice(0,12);

  // ── Header text (not for live MLB)
  if(!(isMLB&&isActive)){
    const label=status.slice(0,9).toUpperCase();
    if(label){
      const tw=hfW(label);
      const tx=Math.max(1,Math.floor((CW-tw)/2));
      drawHybridText(ctx,tx+1,2,label,[8,8,8,180]);
      drawHybridText(ctx,tx,1,label,[255,240,150,255]);
    }
    fi(ctx,0,7,CW,1,55,76,130);
  }

  // ── Logos
  const aLogoX=1, hLogoX=CW-LOGO_SZ-1, logoY=PH-LOGO_SZ-1;
  const aLogo=logoCache[g.away_logo]||null;
  const hLogo=logoCache[g.home_logo]||null;
  if(aLogo) ctx.drawImage(aLogo,aLogoX,logoY);
  else drawFallbackLogo(ctx,aLogoX,logoY,g.ac);
  if(hLogo) ctx.drawImage(hLogo,hLogoX,logoY);
  else drawFallbackLogo(ctx,hLogoX,logoY,g.hc);

  // ── Safe zone
  const cL=aLogoX+LOGO_SZ+LOGO_PAD;
  const cR=hLogoX-LOGO_PAD;
  const cCX=Math.floor((cL+cR)/2);
  const centerX=(cL+cR)/2;

  // ── Score (sc=2, centered, y=9)
  if(!(isMLB&&isActive)){
    const aS=String(g.as), hS=String(g.hs);
    const aSW=pfW(aS,2), hSW=pfW(hS,2), dSW=pfW('-',2);
    const totSW=aSW+dSW+hSW;
    const sx=Math.round(centerX-totSW/2);
    pfText(ctx,aS,      sx,      9,255,255,255,2);
    pfText(ctx,'-',     sx+aSW,  9,255,255,255,2);
    pfText(ctx,hS,      sx+aSW+dSW,9,255,255,255,2);
  }

  // ══ NFL ══
  if(isNFL&&isActive){
    const poss=sit.possession||g.poss||'';
    const dd=sit.downDist||g.dd||'';
    const rz=sit.isRedZone||g.rz||false;
    const possS=sideFromValue(poss,g);
    if(possS==='home'||possS==='away'){
      const hdrCX=possS==='home'?hLogoX+LOGO_SZ/2-1:aLogoX+LOGO_SZ/2-1;
      drawFootball(ctx,Math.round(hdrCX),2);
    }
    if(rz){
      ctx.strokeStyle='rgba(255,40,40,0.6)'; ctx.lineWidth=1;
      ctx.strokeRect(0.5,0.5,CW-1,PH-1);
    }
    if(dd){
      const ddColor=rz?[235,70,70]:[0,200,60];
      pfText(ctx,dd,cCX-pfW(dd)/2,23,...ddColor);
    }
  }

  // ══ NHL ══
  if(isNHL&&isActive&&!isSO){
    const poss=sit.possession||g.poss||'';
    const isPP=sit.powerPlay||g.pp||false;
    const isEN=sit.emptyNet||g.en||false;
    const possS=sideFromValue(poss,g);
    const possHdrX=possS==='home'?hLogoX+LOGO_SZ/2:aLogoX+LOGO_SZ/2;
    if(isEN){
      pfText(ctx,'EN',possHdrX-pfW('EN')/2,2,255,100,100);
    } else if(isPP&&(possS==='home'||possS==='away')){
      pfText(ctx,'PP',possHdrX-pfW('PP')/2,2,255,220,0);
    }
  }
  if(isNHL&&isSO){
    const soA=(shootout&&shootout.away)||[];
    const soH=(shootout&&shootout.home)||[];
    drawSoColumn(ctx,aLogoX+LOGO_SZ+2,9,soA,true,5,7,3);
    drawSoColumn(ctx,hLogoX-7,9,soH,true,5,7,3);
  }

  // ══ MLB ══
  if(isMLB&&isActive){
    const balls=parseInt(sit.balls||g.balls||0)||0;
    const strikes=parseInt(sit.strikes||g.strikes||0)||0;
    const outs=parseInt(sit.outs||g.outs||0)||0;
    const on1=!!(sit.onFirst||g.on1);
    const on2=!!(sit.onSecond||g.on2);
    const on3=!!(sit.onThird||g.on3);

    const su=status.toUpperCase();
    let isTop=su.includes('TOP')||su.includes('T ');
    if('isTop' in g) isTop=!!g.isTop;

    fi(ctx,0,0,CW,8,0,0,0);
    fi(ctx,0,7,CW,1,55,76,130);

    const innMatch=status.match(/\d+/);
    const innNum=innMatch?innMatch[0]:'';
    const arrowG=isTop?'▲':'▼';
    const arrowW=pfW(arrowG), numW=pfW(innNum);
    const hx=Math.max(1,Math.floor((CW-(arrowW+numW))/2));
    pfText(ctx,arrowG,hx+1,2,8,8,8);
    pfText(ctx,innNum,hx+arrowW+1,2,8,8,8);
    pfText(ctx,arrowG,hx,1,255,220,105);
    pfText(ctx,innNum,hx+arrowW,1,255,240,150);

    const bG=String(balls), sG=String(strikes);
    const bsW=pfW(bG)+pfW('-')+pfW(sG);
    const batS=sideFromValue(sit.possession||g.poss||'',g)||(isTop?'away':'home');
    const bsHdrX=batS==='home'?hLogoX+LOGO_SZ/2-bsW/2:aLogoX+LOGO_SZ/2-bsW/2;
    let bsx=Math.round(bsHdrX);
    bsx+=pfText(ctx,bG,bsx,2,60,200,60);
    bsx+=pfText(ctx,'-',bsx,2,160,160,160);
    pfText(ctx,sG,bsx,2,255,140,40);

    const aS=String(g.as), hS=String(g.hs);
    const aSW=pfW(aS,2), hSW=pfW(hS,2), dSW=pfW('-',2);
    const totSW=aSW+dSW+hSW;
    const scoreX=Math.round(centerX-totSW/2);
    const dashX=scoreX+aSW;
    pfText(ctx,aS,scoreX,8,255,255,255,2);
    pfText(ctx,'-',dashX,8,255,255,255,2);
    pfText(ctx,hS,dashX+dSW,8,255,255,255,2);

    drawBaseDiamond(ctx,dashX+3,19,on1,on2,on3);
    const outTotW=3*5-1, ox=dashX+3-Math.floor(outTotW/2);
    for(let i=0;i<3;i++){
      const col=i<outs?[210,70,70]:[45,45,45];
      fi(ctx,ox+i*5,28,4,3,...col);
    }
  }

  // ══ Soccer SO ══
  if(isSoc&&isSO){
    const soA=(shootout&&shootout.away)||[];
    const soH=(shootout&&shootout.home)||[];
    // draw 3×3 dots
    const _socCol=(x,y,results)=>{
      for(let i=0;i<5;i++){
        const r=i<results.length?results[i]:'pending';
        const dy=y+i*5;
        if(r==='goal') fi(ctx,x,dy,3,3,50,200,70);
        else if(r==='miss') fi(ctx,x,dy,3,3,220,55,55);
        else fi(ctx,x,dy,3,3,80,80,80);
      }
    };
    _socCol(aLogoX+LOGO_SZ+2,8,soA);
    _socCol(hLogoX-5,8,soH);
  }

  // ══ March Madness ══
  if(isMarch){
    const sA=String(g.seed_a||g.away_seed||''), sH=String(g.seed_h||g.home_seed||'');
    const wonA=g.state==='post'&&g.as>g.hs, wonH=g.state==='post'&&g.hs>g.as;
    const aC=wonA?[100,210,100]:wonH?[170,70,70]:[66,117,199];
    const hC=wonH?[100,210,100]:wonA?[170,70,70]:[66,117,199];
    pfText(ctx,sA,2,2,...aC);
    pfText(ctx,sH,CW-pfW(sH)-2,2,...hC);
  }

  return oc;
}

// ═══════════════════════════════════════════════════════════════════════════════
// CLOCK CARD — port of draw_clock_modern (uses canvas font)
// ═══════════════════════════════════════════════════════════════════════════════
function renderClockCard(){
  const oc=document.createElement('canvas'); oc.width=PW; oc.height=PH;
  const ctx=oc.getContext('2d');
  fi(ctx,0,0,PW,PH,0,0,0);
  const now=new Date();
  const days=['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
  const months=['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE',
                'JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
  const dateStr=`${days[now.getDay()]} ${months[now.getMonth()]} ${now.getDate()}`;
  ctx.font='bold 7px "Courier New",monospace';
  ctx.fillStyle='rgb(200,200,200)';
  ctx.textBaseline='top';
  const dw=ctx.measureText(dateStr).width;
  ctx.fillText(dateStr,(PW-dw)/2,-1);

  let h=now.getHours()%12||12;
  const timeStr=`${h}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  ctx.font='bold 20px "Courier New",monospace';
  ctx.fillStyle='white'; ctx.textBaseline='top';
  const tw=ctx.measureText(timeStr).width;
  ctx.fillText(timeStr,(PW-tw)/2,5);

  const secFrac=(now.getSeconds()+now.getMilliseconds()/1000)/60;
  fi(ctx,0,31,PW,1,30,30,30);
  fi(ctx,0,31,Math.round(secFrac*PW),1,0,200,255);
  return oc;
}

// STOCK CARD
// ═══════════════════════════════════════════════════════════════════════════════
function renderStockCard(g){
  const oc=document.createElement('canvas'); oc.width=128; oc.height=PH;
  const ctx=oc.getContext('2d');
  fi(ctx,0,0,128,PH,0,0,0);
  const sym=String(g.home_abbr||'UNK');
  const price=String(g.home_score||'0.00');
  const pct=String(g.away_score||'0.00%');
  const isUp=!pct.startsWith('-');
  const col=isUp?[0,220,0]:[220,0,0];
  const logo=logoCache[g.home_logo]||null;
  const xOff=logo?28:2;
  if(logo) ctx.drawImage(logo,2,4);
  ctx.textBaseline='top';
  ctx.font='bold 8px "Courier New",monospace';
  ctx.fillStyle='white'; ctx.fillText(sym,xOff,-1);
  ctx.font='bold 10px "Courier New",monospace';
  ctx.fillStyle=`rgb(${col.join(',')})`;
  ctx.fillText('$'+price,xOff,10);
  ctx.font='7px "Courier New",monospace';
  const pw=ctx.measureText(pct).width;
  ctx.fillText(pct,126-pw,-1);
  return oc;
}

// ═══════════════════════════════════════════════════════════════════════════════
// FLIGHT CARD
// ═══════════════════════════════════════════════════════════════════════════════
function renderFlightCard(g){
  const oc=document.createElement('canvas'); oc.width=PW; oc.height=PH;
  const ctx=oc.getContext('2d');
  fi(ctx,0,0,PW,PH,5,5,8);
  const isLive=!!g.is_live;
  const isDelayed=!!g.is_delayed||parseInt(g.delay_min||0)>0;
  const planeCol=isDelayed?[220,50,50]:isLive?[0,200,100]:[255,170,0];
  // Plane icon (port of _icon_plane at x=6,y=2)
  const px=6, py=2;
  const pts=[[px+2,py],[px+1,py+1],[px+2,py+1],[px+3,py+1],[px,py+2],[px+1,py+2],[px+2,py+2],[px+3,py+2],[px+4,py+2],[px+2,py+3],[px+1,py+4],[px+2,py+4],[px+3,py+4]];
  ctx.fillStyle=`rgb(${planeCol.join(',')})`;
  for(const [x,y] of pts) ctx.fillRect(x,y,1,1);
  const guestName=String(g.guest_name||g.id||'???');
  drawTinyText(ctx,18,2,guestName,[255,170,0]);
  const route=`${g.origin_city||'???'} > ${g.dest_city||'???'}`;
  drawTinyText(ctx,6,10,route,[80,180,255]);
  const alt=parseInt(g.alt||0), dist=parseInt(g.dist||0), spd=parseInt(g.speed||0);
  const eta=String(g.eta_str||'--');
  if(isLive) drawTinyText(ctx,6,18,`${dist}MI ${eta} ${spd}MPH ${alt.toLocaleString()}FT`,[220,220,230]);
  else drawTinyText(ctx,6,18,String(g.status||'SCHEDULED').toUpperCase(),[255,170,0]);
  const prog=parseInt(g.progress||0)/100;
  fi(ctx,6,27,372,3,...(isDelayed?[60,10,10]:[15,35,15]));
  fi(ctx,6,27,Math.round(372*Math.max(0.02,Math.min(0.98,prog))),3,...(isDelayed?[220,50,50]:[80,255,80]));
  return oc;
}

// ═══════════════════════════════════════════════════════════════════════════════
// ROUTING
// ═══════════════════════════════════════════════════════════════════════════════
const FULL_MODES=new Set(['sports_full','soccer_full','nhl_full','mlb_full','nfl_full','nba_full']);
const SPORT_FILTER={nhl_full:'hockey',mlb_full:'baseball',nfl_full:'football',nba_full:'basketball',soccer_full:'soccer'};

function routeItems(items, mode){
  const scrolling=[], statics=[];
  const sportFilter=SPORT_FILTER[mode]||null;
  for(const g of items){
    const t=g.type||'', s=(g.sport||'').toLowerCase();
    const isMusic=t==='music'||s==='music';
    const isWeather=t==='weather';
    const isClock=s.startsWith('clock');
    const isGolfFull=(t==='golf'||t==='masters'||s==='golf'||s==='masters')&&(mode==='golf'||mode==='masters');
    const isFlight=t==='flight_visitor'||t==='flight_airport_hud';
    const isStock=t==='stock_ticker'||s.startsWith('stock');
    const isLeader=t==='leaderboard';
    if(mode==='stocks'){ if(isStock) statics.push(g); continue; }
    if(mode==='flights'){ if(isFlight) statics.push(g); continue; }
    if(mode==='weather'){ if(isWeather) statics.push(g); continue; }
    if(mode==='clock'){ if(isClock) statics.push(g); continue; }
    if(isMusic||isWeather||isClock||isGolfFull||isFlight){ statics.push(g); continue; }
    if(FULL_MODES.has(mode)&&!isStock&&!isLeader){
      if(sportFilter&&!s.includes(sportFilter)){ scrolling.push(g); continue; }
      statics.push(g);
    } else {
      scrolling.push(g);
    }
  }
  return{scrolling,statics};
}

function isLiveCard(g){
  const t=g.type||'', s=(g.sport||'').toLowerCase();
  return t==='music'||s==='music'||s.startsWith('clock')||t==='weather';
}

function renderItem(g, mode){
  const t=g.type||'', s=(g.sport||'').toLowerCase();
  if(s.startsWith('clock')) return renderClockCard();
  if(t==='stock_ticker'||s.startsWith('stock')) return renderStockCard(g);
  if(t==='flight_visitor'||t==='flight_airport_hud') return renderFlightCard(g);
  if(FULL_MODES.has(mode)) return renderFullBleedCard(g);
  return renderStadiumCard(g);
}

// Full-bleed: simple but accurate for non-full-bleed modes fallback
function renderFullBleedCard(g){
  const ng=normalizeGame(g);
  const oc=document.createElement('canvas'); oc.width=PW; oc.height=PH;
  const ctx=oc.getContext('2d');
  fi(ctx,0,0,PW,PH,0,0,0);
  // Left color band
  fi(ctx,0,0,32,PH,...ng.ac);
  // Right color band
  fi(ctx,PW-32,0,32,PH,...ng.hc);
  // Center black with subtle tint
  fi(ctx,32,0,PW-64,PH,8,8,12);
  // Logos
  const aLogo=logoCache[ng.away_logo]||null;
  const hLogo=logoCache[ng.home_logo]||null;
  const LOGO_FB=24;
  if(aLogo) ctx.drawImage(aLogo,4,(PH-LOGO_FB)/2,LOGO_FB,LOGO_FB);
  if(hLogo) ctx.drawImage(hLogo,PW-LOGO_FB-4,(PH-LOGO_FB)/2,LOGO_FB,LOGO_FB);
  // Score center
  const aS=String(ng.as), hS=String(ng.hs);
  const aSW=pfW(aS,2), dSW=pfW('-',2), hSW=pfW(hS,2);
  const totSW=aSW+dSW+hSW;
  const sx=Math.round(PW/2-totSW/2);
  pfText(ctx,aS,sx,11,255,255,255,2);
  pfText(ctx,'-',sx+aSW,11,255,255,255,2);
  pfText(ctx,ng.hs,sx+aSW+dSW,11,255,255,255,2);
  // Status
  const status=String(ng.status||'').slice(0,12);
  const tw=hfW(status.toUpperCase().slice(0,9));
  drawHybridText(ctx,Math.round(PW/2-tw/2),1,status,[255,240,150,255]);
  // Separator lines
  fi(ctx,32,0,1,PH,255,255,255,40); fi(ctx,PW-33,0,1,PH,255,255,255,40);
  return oc;
}

// ═══════════════════════════════════════════════════════════════════════════════
// SCROLL STRIP
// ═══════════════════════════════════════════════════════════════════════════════
let scrollStrip=null, scrollOffset=0;

function buildScrollStrip(games){
  const cards=games.map(g=>renderStadiumCard(g)).filter(Boolean);
  if(!cards.length) return null;
  const totalW=cards.reduce((s,c)=>s+c.width,0)+cards.length*SEP_PX;
  const strip=document.createElement('canvas'); strip.width=totalW+PW; strip.height=PH;
  const ctx=strip.getContext('2d');
  ctx.fillStyle='black'; ctx.fillRect(0,0,strip.width,PH);
  let x=0;
  for(const c of cards){
    ctx.drawImage(c,x,0);
    x+=c.width+SEP_PX;
  }
  // Copy first PW px to the end for seamless wrap
  ctx.drawImage(strip,0,0,PW,PH,x,0,PW,PH);
  return strip;
}

// ═══════════════════════════════════════════════════════════════════════════════
// STATIC CYCLING
// ═══════════════════════════════════════════════════════════════════════════════
let staticItems=[], staticIdx=0, showingStatic=false, staticUntil=0, staticGame=null, staticCanvas=null;

function advanceStatic(ts){
  if(!staticItems.length) return;
  staticGame=staticItems[staticIdx%staticItems.length];
  staticIdx++;
  if(!isLiveCard(staticGame)) staticCanvas=renderItem(staticGame,currentMode);
  else staticCanvas=null;
  staticUntil=Date.now()+PAGE_HOLD_MS;
  showingStatic=true;
}

// ═══════════════════════════════════════════════════════════════════════════════
// LED CIRCLE OVERLAY
// ═══════════════════════════════════════════════════════════════════════════════
function buildLedMask(){
  const W=PW*SCALE, H=PH*SCALE;
  const m=document.createElement('canvas'); m.width=W; m.height=H;
  const c=m.getContext('2d');
  c.fillStyle='rgba(0,0,0,0.88)'; c.fillRect(0,0,W,H);
  c.globalCompositeOperation='destination-out';
  const r=SCALE*0.38;
  for(let y=0;y<PH;y++) for(let x=0;x<PW;x++){
    c.beginPath(); c.arc(x*SCALE+SCALE*.5,y*SCALE+SCALE*.5,r,0,Math.PI*2); c.fill();
  }
  return m;
}
function getLedMask(){ return ledMask||(ledMask=buildLedMask()); }

function toggleLed(){
  ledEffect=!ledEffect;
  document.getElementById('ledBtn').classList.toggle('active',ledEffect);
}

// ═══════════════════════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════════════════════════════
let lastTs=0;

function renderFrame(ts){
  requestAnimationFrame(renderFrame);
  const dt=Math.min((ts-lastTs)/1000,0.1); lastTs=ts;

  dCtx.fillStyle='black';
  dCtx.fillRect(0,0,displayCanvas.width,displayCanvas.height);

  // No data → show clock
  if(!scrollStrip&&!staticItems.length){
    const clk=renderClockCard();
    dCtx.imageSmoothingEnabled=false;
    dCtx.drawImage(clk,0,0,displayCanvas.width,displayCanvas.height);
    addOverlay(); return;
  }

  // Static display
  if(showingStatic){
    if(Date.now()>staticUntil){ showingStatic=false; }
    else{
      let src=staticCanvas;
      if(!src&&staticGame) src=renderItem(staticGame,currentMode);
      if(src){
        dCtx.imageSmoothingEnabled=false;
        dCtx.drawImage(src,0,0,displayCanvas.width,displayCanvas.height);
      }
      addOverlay(); return;
    }
  }

  // Static-only mode
  if(!scrollStrip||scrollStrip.width<=PW){
    if(staticItems.length) advanceStatic(ts);
    else{ dCtx.imageSmoothingEnabled=false; dCtx.drawImage(renderClockCard(),0,0,displayCanvas.width,displayCanvas.height); }
    addOverlay(); return;
  }

  // Scrolling strip
  if(!paused) scrollOffset+=scrollSpeed;
  const usableW=scrollStrip.width-PW;
  if(scrollOffset>=usableW) scrollOffset=0;
  const x=Math.floor(scrollOffset);
  dCtx.imageSmoothingEnabled=false;
  dCtx.drawImage(scrollStrip,x,0,PW,PH,0,0,displayCanvas.width,displayCanvas.height);
  addOverlay();
}

function addOverlay(){
  if(ledEffect) dCtx.drawImage(getLedMask(),0,0);
}

// ═══════════════════════════════════════════════════════════════════════════════
// ROUTING + STRIP BUILD
// ═══════════════════════════════════════════════════════════════════════════════
function routeAndRender(){
  const{scrolling,statics}=routeItems(allGames,currentMode);
  staticItems=statics; staticIdx=0; showingStatic=false; staticCanvas=null;

  if(scrolling.length){
    const oldW=scrollStrip?scrollStrip.width-PW:0;
    const pct=oldW>0?scrollOffset/oldW:0;
    scrollStrip=buildScrollStrip(scrolling);
    const newW=Math.max(1,scrollStrip.width-PW);
    scrollOffset=Math.round(pct*newW);
  } else {
    scrollStrip=null; scrollOffset=0;
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// DATA FETCHING
// ═══════════════════════════════════════════════════════════════════════════════
let allGames=[], currentMode='sports', localModeOverride=false;
const CLIENT_ONLY=new Set(['nhl_full','mlb_full','nfl_full','nba_full']);

async function fetchData(){
  try{
    const r=await fetch('/api/data');
    if(!r.ok) throw new Error('HTTP '+r.status);
    const data=await r.json();
    if(data.error) throw new Error(data.error);
    allGames=data.content?.sports||[];
    const serverMode=(data.local_config||{}).mode;
    if(serverMode&&!localModeOverride&&!CLIENT_ONLY.has(currentMode)&&serverMode!==currentMode){
      currentMode=serverMode; updateModeButtons();
    }
    await prefetchLogos(allGames);
    routeAndRender();
    if(document.getElementById('pinPanel').classList.contains('open')) buildPinPanel();
    const n=allGames.length;
    document.getElementById('status').textContent=`${n} item${n!==1?'s':''} · mode: ${currentMode} · ${new Date().toLocaleTimeString()}`;
  }catch(e){
    document.getElementById('status').textContent='Error: '+e.message;
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// MODE + PIN CONTROLS
// ═══════════════════════════════════════════════════════════════════════════════
let burstUntil=0, pinnedSet=new Set();
function startBurst(){ burstUntil=Date.now()+15000; }

async function setMode(mode){
  currentMode=mode; localModeOverride=true;
  updateModeButtons(); routeAndRender(); startBurst();
  try{
    await fetch('/api/set_mode',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({mode})});
  }catch(e){}
  document.getElementById('status').textContent=`Mode → ${mode}`;
  setTimeout(()=>{ localModeOverride=false; },15000);
}

function updateModeButtons(){
  document.querySelectorAll('#modeRow .btn').forEach(btn=>
    btn.classList.toggle('active',btn.dataset.mode===currentMode));
}

function togglePin(id,checked){
  if(checked) pinnedSet.add(id); else pinnedSet.delete(id);
  document.getElementById('pinBtn').textContent=`Pin (${pinnedSet.size})`;
  startBurst();
  fetch('/api/pin_games',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({game_ids:[...pinnedSet]})}).catch(()=>{});
}

function togglePinPanel(){
  const panel=document.getElementById('pinPanel');
  if(panel.classList.toggle('open')){ buildPinPanel(); setTimeout(()=>{ document.addEventListener('click',_closePinOutside,{once:true}); },0); }
}
function _closePinOutside(e){
  const p=document.getElementById('pinPanel');
  if(!p.contains(e.target)&&e.target!==document.getElementById('pinBtn')) p.classList.remove('open');
  else if(p.classList.contains('open')) setTimeout(()=>{ document.addEventListener('click',_closePinOutside,{once:true}); },0);
}
function buildPinPanel(){
  const list=document.getElementById('pinList'); list.innerHTML='';
  const filter=(document.getElementById('pinSearch').value||'').toLowerCase();
  const pins=allGames.filter(g=>!['music','weather','stock_ticker','leaderboard'].includes(g.type||'')&&!(g.sport||'').toLowerCase().startsWith('clock'));
  if(!pins.length){ list.innerHTML='<div class="pin-none">No live games</div>'; return; }
  let shown=0;
  for(const g of pins){
    const id=g.id||''; const away=g.away_abbr||g.away||'???'; const home=g.home_abbr||g.home||'???';
    const sport=(g.sport||'').toUpperCase(); const status=g.status||'';
    const label=`${away} @ ${home}`;
    if(filter&&!label.toLowerCase().includes(filter)&&!sport.toLowerCase().includes(filter)) continue;
    const row=document.createElement('div'); row.className='pin-row';
    const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=pinnedSet.has(id);
    cb.onchange=()=>togglePin(id,cb.checked);
    const lbl=document.createElement('div'); lbl.className='pin-label'; lbl.textContent=label;
    const badge=document.createElement('span'); badge.className='pin-badge'; badge.textContent=`${sport} · ${status}`;
    row.append(cb,lbl,badge);
    row.onclick=e=>{ if(e.target!==cb){ cb.checked=!cb.checked; togglePin(id,cb.checked); }};
    list.appendChild(row); shown++;
  }
  if(!shown) list.innerHTML='<div class="pin-none">No matches</div>';
}

function togglePause(){
  paused=!paused;
  const btn=document.getElementById('pauseBtn');
  btn.textContent=paused?'▶':'⏸'; btn.classList.toggle('active',paused);
}

// ═══════════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════════
requestAnimationFrame(renderFrame);

fetchData();
(function poll(){
  const d=Date.now()<burstUntil?1000:10000;
  setTimeout(()=>{ fetchData(); poll(); },d);
})();
</script>
